services:
  # ==================== monitor-backend：监控数据收集与聚合服务 ====================
  #
  # 独立部署，不属于任何一个业务项目
  # 所有业务项目的 nginx 通过 proxy_pass 将 /monitor/ 请求转发至此服务
  # 靠 appKey 字段区分不同业务的数据，天然支持多业务汇聚
  #
  monitor-backend:
    image: ${DOCKER_HUB_USERNAME}/monitor-backend:${MONITOR_BACKEND_TAG:-latest}
    expose:
      - "${PORT:-3100}"
    environment:
      - PORT=${PORT:-3100}
      # NODE_ENV 影响 better-sqlite3 等依赖的行为
      - NODE_ENV=production
    # volumes 由环境覆盖文件声明，生产和测试数据完全隔离
    restart: always
