name: 部署前端

on:
  repository_dispatch:
    types:
      - deploy-frontend

  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像 tag（留空则重用服务器当前运行版本，仅重启容器）'
        required: false
        default: ''
      environment:
        description: '部署环境'
        required: true
        # 手动触发最常见场景是重新部署测试环境，默认 dev
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infra 仓库
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # 统一从 payload 或手动输入中取参数
      - name: 解析部署参数
        id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
            echo "ENVIRONMENT=${{ github.event.client_payload.environment }}" >> $GITHUB_OUTPUT
            echo "SKIP_PULL=false" >> $GITHUB_OUTPUT
          else
            IMAGE_TAG="${{ inputs.image_tag }}"
            if [ -z "$IMAGE_TAG" ]; then
              # tag 为空：不拉新镜像，直接重启容器（用服务器已有镜像）
              # 适用场景：配置变更（如 Secrets 更新）后重启，或服务器异常重启恢复
              echo "IMAGE_TAG=" >> $GITHUB_OUTPUT
              echo "SKIP_PULL=true" >> $GITHUB_OUTPUT
            else
              echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT
              echo "SKIP_PULL=false" >> $GITHUB_OUTPUT
            fi
            echo "ENVIRONMENT=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          fi

      # 把 compose 文件从 runner 传到服务器
      # 服务器不需要存放仓库，每次部署由 runner 传输最新配置
      - name: 上传 Compose 文件到服务器
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634  # v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "security-quiz-game/docker-compose.yml,security-quiz-game/docker-compose.${{ steps.params.outputs.ENVIRONMENT }}.yml"
          target: "~/deploy/security-quiz-game/"
          strip_components: 1

      - name: 部署前端到服务器
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262  # v1.0.3
        env:
          # Secret 通过 env 传入 runner 环境，再由 ssh-action 加密传入 SSH session
          # 不拼接到命令行，避免明文出现在服务器 ps aux / shell history 中
          # 前端容器不消费 CORS_ORIGIN / JWT_SECRET，此处不传（职责分离）
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          FRONTEND_TAG: ${{ steps.params.outputs.IMAGE_TAG }}
          ENVIRONMENT: ${{ steps.params.outputs.ENVIRONMENT }}
          SKIP_PULL: ${{ steps.params.outputs.SKIP_PULL }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          envs: DOCKER_HUB_USERNAME,FRONTEND_TAG,ENVIRONMENT
          script: |
            # SKIP_PULL 直接由 runner 注入为字面值，避免 envs 传递空变量时的不可靠行为
            if [ "${{ steps.params.outputs.SKIP_PULL }}" != "true" ]; then
              docker pull $DOCKER_HUB_USERNAME/security-quiz-game:$FRONTEND_TAG
            fi
            DOCKER_HUB_USERNAME=$DOCKER_HUB_USERNAME \
            FRONTEND_TAG=$FRONTEND_TAG \
            docker compose \
              -f ~/deploy/security-quiz-game/docker-compose.yml \
              -f ~/deploy/security-quiz-game/docker-compose.$ENVIRONMENT.yml \
              up -d --no-deps frontend
            # --no-deps：只启动 frontend 服务，不拉取/启动 backend 等依赖服务
            # 前后端独立部署，各自管理自己的镜像，互不干扰
