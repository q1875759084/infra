services:
  # ==================== 前端：Nginx 托管静态文件 + 反向代理 ====================
  # 唯一对外暴露的入口，所有流量经过 Nginx
  # 静态文件直接返回，/api/* 和 /socket 转发给 backend 服务
  # 端口映射由环境覆盖文件决定（docker-compose.prod.yml / docker-compose.dev.yml）
  frontend:
    image: ${DOCKER_HUB_USERNAME}/cowatch:${FRONTEND_TAG:-latest}
    restart: always

  # ==================== 后端：Node.js Express + WebSocket 服务 ====================
  # 不对外直接暴露，只在 Compose 内部网络可访问
  # WebSocket 端点：ws://backend:3002/socket
  # REST API 端点：http://backend:3002/api/*
  backend:
    image: ${DOCKER_HUB_USERNAME}/cowatch-backend:${BACKEND_TAG:-latest}
    expose:
      - "${BACKEND_PORT:-3002}"   # 仅在 Compose 内部网络暴露，不映射到宿主机端口
    environment:
      - PORT=${BACKEND_PORT:-3002}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      # PostgreSQL 连接字符串，由各环境覆盖文件中的 PG_PASSWORD 等变量拼接
      - DATABASE_URL=postgresql://${PG_USER:-cowatch}:${PG_PASSWORD}@postgres:5432/${PG_DB:-cowatch}
      # COS 配置（留空则自动降级为本地 uploads/ 文件存储模式）
      - COS_REGION=${COS_REGION:-}
      - COS_BUCKET=${COS_BUCKET:-}
      - COS_SECRET_ID=${COS_SECRET_ID:-}
      - COS_SECRET_KEY=${COS_SECRET_KEY:-}
      # CDN 域名（接入 CDN 后填写，否则留空使用 COS 默认域名）
      - COS_BASE_URL=${COS_BASE_URL:-}
      # CDN TypeA 鉴权密钥（CDN 控制台 → 访问控制 → 鉴权配置，留空则回退到 COS 签名模式）
      - CDN_AUTH_KEY=${CDN_AUTH_KEY:-}
      # static 桶配置（public read，用于头像存储；与视频桶共用 SecretId/SecretKey 和 Region）
      - COS_STATIC_BUCKET=${COS_STATIC_BUCKET:-}
      - COS_STATIC_URL=${COS_STATIC_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          # 服务器 2 核，保留 0.5 核给宿主机 + 其他服务
          cpus: '1.5'
          # WebSocket 长连接 + 视频上传缓冲内存上限
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M

  # ==================== PostgreSQL 数据库 ====================
  # 内部服务，不对外暴露端口
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${PG_USER:-cowatch}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_DB=${PG_DB:-cowatch}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-cowatch} -d ${PG_DB:-cowatch}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    # volumes 由各环境覆盖文件声明
