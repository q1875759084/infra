services:
  # ==================== 前端：Nginx 托管静态文件 + 反向代理 ====================
  # 唯一对外暴露的入口，所有流量经过 Nginx
  # 静态文件直接返回，/api/* 转发给 backend 服务
  # SSE 接口（/api/convert/progress/*）单独配置无缓冲代理
  frontend:
    image: ${DOCKER_HUB_USERNAME}/video-to-audio:${FRONTEND_TAG:-latest}
    # 不设置 depends_on：前后端独立部署，互不干扰
    # backend 未启动时 nginx 对 /api/* 返回 502，不影响前端容器本身启动
    restart: always

  # ==================== 后端：Node.js Express 服务 ====================
  # 不对外直接暴露，只在 Compose 内部网络可访问
  # 镜像内已安装 ffmpeg 和 yt-dlp
  backend:
    image: ${DOCKER_HUB_USERNAME}/video-to-audio-backend:${BACKEND_TAG:-latest}
    expose:
      - "${BACKEND_PORT:-3000}"
    environment:
      - PORT=${BACKEND_PORT:-3000}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      # 预设账号直接写死在代码里（试验阶段，无注册功能）
      # 待支持正式注册流程后移除
    # volumes 由环境覆盖文件声明，生产和测试数据完全隔离
    restart: always
    deploy:
      resources:
        limits:
          # 服务器 2 核，本服务最多用 1.5 核
          # 保留 0.5 核给宿主机 + 其他服务（nginx、security-quiz-game 等）
          # queue.ts 的 MAX_CONCURRENT=1 与此对齐：1 个 ffmpeg 约用 1 核，留 0.5 给 Node.js
          cpus: '1.5'
          # 内存上限：yt-dlp 缓存 + ffmpeg 解码缓冲 + Node.js 堆
          memory: 768M
        reservations:
          # 软保证：系统繁忙时至少保留 0.5 核给 Node.js 事件循环响应请求
          cpus: '0.5'
          memory: 256M
